<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .sidebar {
            margin-bottom: 15px;
            width: 300px;
        }

        .sidebar iframe {
            width: 100%;
        }

        iframe {
            border-radius: 12px;
            margin: 8px;
        }
        h2{
            padding: 15px;
            margin: 0px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #222222;
            color: white;
        }
    </style>
</head>

<body>
    <h2>Watch News</h2>
    <div class="sidebar">
        <iframe width="520" src="https://www.youtube.com/embed/TGFkuH7GRX8?si=YQVs26ZibEmwj5wZ"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <iframe width="520" src="https://www.youtube.com/embed/s232MVK6qqA?si=6X2gjZQmUH-YcwCJ"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <iframe width="520" src="https://www.youtube.com/embed/nofrB32FXns?si=bzNr3eZf3NBPQ9VP"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"

        <iframe width="520" src="https://www.youtube.com/embed/pu5T54I9wso?si=x6pTAxJk5UqZPcjE"

            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
</body>

</html>
